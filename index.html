function closeSummary() {
  summaryBackdrop.classList.remove('visible');
  document.body.style.overflow = '';
}

async function openSummaryModal() {
  summaryBodyEl.innerHTML = `
    <div class="summary-loading">
      <div class="modal-spinner"></div>
      <span>Fetching batch statistics…</span>
    </div>`;
  summaryBackdrop.classList.add('visible');
  document.body.style.overflow = 'hidden';

  const predictedFiles = allFiles().filter(f => f.prediction !== null);
  if (!predictedFiles.length) {
    summaryBodyEl.innerHTML = `<div class="summary-loading"><span>No predictions yet. Run the model first.</span></div>`;
    return;
  }

  const fd = new FormData();
  predictedFiles.forEach(fe => fd.append('files', fe.file));

  try {
    const res = await fetch('/predict/summary', { method: 'POST', body: fd });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    renderSummaryModal(data);
  } catch(err) {
    summaryBodyEl.innerHTML = `<div class="summary-loading" style="color:var(--danger)"><span>Failed: ${escHtml(err.message)}</span></div>`;
  }
}

function renderSummaryModal(data) {
  /*
    Expected shape from /predict/summary (via batch_summary helper):
    {
      num_images, class_distribution, mean_probabilities,
      std_probabilities, max_probabilities, dominant_class,
      mean_confidence, confidence_hist, per_image
    }
  */
  const numImages       = data.num_images       || 0;
  const dominantClass   = data.dominant_class   || '—';
  const meanConf        = data.mean_confidence  != null ? (data.mean_confidence * 100).toFixed(1) + '%' : '—';
  const classDist       = data.class_distribution || {};
  const meanProbs       = data.mean_probabilities  || {};
  const stdProbs        = data.std_probabilities   || {};
  const maxProbs        = data.max_probabilities   || {};
  const confHist        = data.confidence_hist;   // array of bin counts or {bins, counts}

  const r = riskOf(dominantClass);
  const dominantClasses = Object.keys(classDist);

  // KPIs
  const kpiHtml = `
    <div class="summary-kpis">
      <div class="summary-kpi">
        <div class="summary-kpi-value">${numImages}</div>
        <div class="summary-kpi-label">Images analysed</div>
      </div>
      <div class="summary-kpi">
        <div class="summary-kpi-value" style="color:${riskBarColor(dominantClass)}">${escHtml(dominantClass.replace('Demented',''))}</div>
        <div class="summary-kpi-label">Dominant class</div>
      </div>
      <div class="summary-kpi">
        <div class="summary-kpi-value">${meanConf}</div>
        <div class="summary-kpi-label">Mean confidence</div>
      </div>
      <div class="summary-kpi">
        <div class="summary-kpi-value">${dominantClasses.length}</div>
        <div class="summary-kpi-label">Classes detected</div>
      </div>
    </div>`;

  // Donut chart (SVG)
  const donutHtml = buildDonutHtml(classDist);

  // Confidence histogram
  const histHtml = buildHistogramHtml(confHist, data.per_image);

  // Mean / Std / Max comparison table
  const probTableHtml = buildProbTableHtml(meanProbs, stdProbs, maxProbs);

  summaryBodyEl.innerHTML = `
    ${kpiHtml}
    <div class="summary-charts">
      <div class="summary-card">
        <div class="summary-card-label">Class distribution</div>
        <div class="summary-card-body">${donutHtml}</div>
      </div>
      <div class="summary-card">
        <div class="summary-card-label">Confidence histogram</div>
        <div class="summary-card-body">${histHtml}</div>
      </div>
    </div>
    <div class="summary-card">
      <div class="summary-card-label">Probability statistics — mean · std · max per class</div>
      <div class="summary-card-body">${probTableHtml}</div>
    </div>`;
}

/* Donut chart SVG */
function buildDonutHtml(dist) {
  const entries  = Object.entries(dist).filter(([,v]) => v > 0);
  const total    = entries.reduce((s,[,v]) => s + v, 0) || 1;
  const SIZE     = 100;
  const CX = 50, CY = 50, R = 36, STROKE = 14;
  const circ     = 2 * Math.PI * R;
  let offset     = 0;

  const arcs = entries.map(([cls, count]) => {
    const frac  = count / total;
    const dash  = frac * circ;
    const gap   = circ - dash;
    const color = riskBarColorRaw(cls);
    const arc   = `<circle cx="${CX}" cy="${CY}" r="${R}"
      fill="none" stroke="${color}" stroke-width="${STROKE}"
      stroke-dasharray="${dash.toFixed(2)} ${gap.toFixed(2)}"
      stroke-dashoffset="${(-offset * circ).toFixed(2)}"
      stroke-linecap="butt"
      style="transition: stroke-dasharray 0.6s cubic-bezier(0.16,1,0.3,1)"
    />`;
    offset += frac;
    return arc;
  });

  const svgHtml = `
    <svg class="donut-svg" width="${SIZE}" height="${SIZE}" viewBox="0 0 ${SIZE} ${SIZE}">
      <circle cx="${CX}" cy="${CY}" r="${R}" fill="none" stroke="var(--border)" stroke-width="${STROKE}"/>
      ${arcs.join('')}
      <text x="${CX}" y="${CY - 4}" text-anchor="middle" font-size="14" fill="var(--text)" font-family="'Instrument Serif',serif">${total}</text>
      <text x="${CX}" y="${CY + 10}" text-anchor="middle" font-size="6" fill="var(--text-3)" font-family="'DM Mono',monospace" letter-spacing="0.05em">IMAGES</text>
    </svg>`;

  const legendRows = entries.map(([cls, count]) => {
    const pct = ((count/total)*100).toFixed(0);
    return `<div class="donut-legend-row">
      <div class="donut-legend-dot" style="background:${riskBarColorRaw(cls)}"></div>
      <span class="donut-legend-label">${escHtml(cls)}</span>
      <span class="donut-legend-val">${count} (${pct}%)</span>
    </div>`;
  }).join('');

  return `<div class="donut-wrap">${svgHtml}<div class="donut-legend">${legendRows}</div></div>`;
}

/* Confidence histogram */
function buildHistogramHtml(confHist, perImage) {
  // Build bins from per_image if confHist isn't provided or is empty
  let bins, counts;
  if (confHist && Array.isArray(confHist) && confHist.length > 0) {
    if (typeof confHist[0] === 'object' && confHist[0].count != null) {
      bins   = confHist.map(b => b.bin_start || b.min || 0);
      counts = confHist.map(b => b.count);
    } else {
      counts = confHist;
      bins   = counts.map((_, i) => i / counts.length);
    }
  } else if (perImage && perImage.length) {
    // Build our own 10-bin histogram
    const NUM_BINS = 10;
    counts = new Array(NUM_BINS).fill(0);
    bins   = Array.from({length: NUM_BINS}, (_, i) => i / NUM_BINS);
    perImage.forEach(item => {
      const c = item.confidence || 0;
      const idx = Math.min(Math.floor(c * NUM_BINS), NUM_BINS - 1);
      counts[idx]++;
    });
  } else {
    return '<div style="color:var(--text-3);font-size:11px;padding:8px 0">No data available</div>';
  }

  const maxCount = Math.max(...counts, 1);

  const barColsHtml = counts.map((c, i) => {
    const pct   = (c / maxCount) * 100;
    const label = `${Math.round(bins[i]*100)}–${Math.round((bins[i]+(1/counts.length))*100)}%`;
    // Color bars by confidence zone
    const col   = c === 0 ? 'var(--border2)' : confBinColor(bins[i]);
    return `<div class="hist-bar-col">
      <div class="hist-bar" style="height:${Math.max(pct,2)}%;background:${col}" title="${c} images · ${label}"></div>
    </div>`;
  }).join('');

  const firstLabel = `${Math.round(bins[0]*100)}%`;
  const lastLabel  = '100%';

  return `
    <div class="histogram-wrap">
      <div class="histogram-bars">${barColsHtml}</div>
      <div class="histogram-axis"><span>${firstLabel}</span><span>Confidence</span><span>${lastLabel}</span></div>
    </div>`;
}

function confBinColor(binStart) {
  if (binStart >= 0.8) return 'var(--risk-safe-fg)';
  if (binStart >= 0.6) return 'var(--risk-low-fg)';
  if (binStart >= 0.4) return 'var(--risk-mid-fg)';
  return 'var(--risk-high-fg)';
}

/* Prob table */
function buildProbTableHtml(meanProbs, stdProbs, maxProbs) {
  const classes = Object.keys(meanProbs);
  if (!classes.length) return '<div style="color:var(--text-3);font-size:11px">No data</div>';

  const headerRow = `<div class="prob-compare-row prob-compare-header">
    <div></div>
    <div style="text-align:right">Mean</div>
    <div style="text-align:right">Std</div>
    <div style="text-align:right">Max</div>
  </div>`;

  const maxMean = Math.max(...classes.map(c => meanProbs[c]||0));

  const rows = classes
    .sort((a,b) => (meanProbs[b]||0) - (meanProbs[a]||0))
    .map(cls => {
      const mean = meanProbs[cls] != null ? (meanProbs[cls]*100).toFixed(1)+'%' : '—';
      const std  = stdProbs[cls]  != null ? (stdProbs[cls]*100).toFixed(1)+'%'  : '—';
      const max  = maxProbs[cls]  != null ? (maxProbs[cls]*100).toFixed(1)+'%'  : '—';
      const isTop = (meanProbs[cls]||0) === maxMean;
      return `<div class="prob-compare-row">
        <div>${riskChip(cls)}</div>
        <div class="prob-val ${isTop?'is-max':''}" style="text-align:right">${mean}</div>
        <div class="prob-val" style="text-align:right">${std}</div>
        <div class="prob-val" style="text-align:right">${max}</div>
      </div>`;
    }).join('');

  return `<div class="prob-compare">${headerRow}${rows}</div>`;
}

/* ═══════════════════════════════════════════════
   CONFIDENCE SCATTER PLOT (canvas)
═══════════════════════════════════════════════ */
function rebuildScatter() {
  const predicted = allFiles().filter(f => f.prediction);
  if (!predicted.length) {
    scatterSection.classList.remove('visible');
    scatterPoints = [];
    return;
  }

  scatterPoints = predicted.map((fe, i) => ({
    x: i,
    y: fe.prediction.confidence,
    cls: fe.prediction.class,
    name: fe.name,
    id: fe.id,
  }));

  scatterSection.classList.add('visible');
  renderLegend();
  renderScatter();
}

function renderLegend() {
  const classes = [...new Set(scatterPoints.map(p => p.cls))];
  scatterLegend.innerHTML = classes.map(cls => `
    <div class="scatter-legend-item">
      <div class="scatter-legend-dot" style="background:${riskBarColorRaw(cls)}"></div>
      ${escHtml(cls)}
    </div>`).join('');
}

function renderScatter() {
  const dpr    = window.devicePixelRatio || 1;
  const wrap   = scatterWrap;
  const W      = wrap.clientWidth - 40;   // 20px padding each side
  const H      = 160;

  scatterCanvas.width  = W * dpr;
  scatterCanvas.height = H * dpr;
  scatterCanvas.style.width  = W + 'px';
  scatterCanvas.style.height = H + 'px';

  const ctx = scatterCanvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const isDark    = document.documentElement.getAttribute('data-theme') === 'dark';
  const gridColor = isDark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.06)';
  const textColor = isDark ? '#606060' : '#b0a090';

  const PAD_L = 36, PAD_R = 8, PAD_T = 8, PAD_B = 22;
  const plotW  = W - PAD_L - PAD_R;
  const plotH  = H - PAD_T - PAD_B;
  const n      = scatterPoints.length;

  // Y axis grid lines at 0.25, 0.5, 0.75, 1.0
  ctx.font      = `9px 'DM Mono', monospace`;
  ctx.fillStyle = textColor;
  ctx.textAlign = 'right';
  [0.25, 0.5, 0.75, 1.0].forEach(v => {
    const y = PAD_T + plotH - v * plotH;
    ctx.strokeStyle = gridColor;
    ctx.setLineDash([3, 4]);
    ctx.lineWidth   = 1;
    ctx.beginPath();
    ctx.moveTo(PAD_L, y);
    ctx.lineTo(PAD_L + plotW, y);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillText((v*100).toFixed(0)+'%', PAD_L - 4, y + 3);
  });

  // X axis label
  ctx.textAlign   = 'center';
  ctx.fillStyle   = textColor;
  ctx.font        = `9px 'DM Mono', monospace`;
  ctx.fillText('Image index', PAD_L + plotW/2, H - 4);

  // Points
  scatterPoints.forEach((pt, i) => {
    const x = PAD_L + (n === 1 ? plotW/2 : (i / (n-1)) * plotW);
    const y = PAD_T + plotH - pt.y * plotH;
    const color = riskBarColorRaw(pt.cls);

    // Vertical drop line
    ctx.strokeStyle = color + '33';
    ctx.lineWidth   = 1;
    ctx.setLineDash([2, 3]);
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x, PAD_T + plotH);
    ctx.stroke();
    ctx.setLineDash([]);

    // Dot
    ctx.beginPath();
    ctx.arc(x, y, 5, 0, Math.PI*2);
    ctx.fillStyle = color;
    ctx.fill();
    ctx.strokeStyle = isDark ? '#0f0f0f' : '#f5f2ed';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Store px coords for hover
    pt._px = x; pt._py = y;
  });
}

// Hover tooltip on scatter
scatterCanvas.addEventListener('mousemove', e => {
  const rect  = scatterCanvas.getBoundingClientRect();
  const mx    = e.clientX - rect.left;
  const my    = e.clientY - rect.top;
  const HIT   = 12;

  let hit = null;
  for (const pt of scatterPoints) {
    if (pt._px == null) continue;
    const dx = mx - pt._px, dy = my - pt._py;
    if (Math.sqrt(dx*dx + dy*dy) < HIT) { hit = pt; break; }
  }

  if (hit) {
    const wrapRect = scatterWrap.getBoundingClientRect();
    const tx = (hit._px + 12);
    const ty = (hit._py - 8);
    scatterTooltip.style.left = tx + 'px';
    scatterTooltip.style.top  = ty + 'px';
    scatterTooltip.innerHTML  = `<strong>${escHtml(hit.name)}</strong>${escHtml(hit.cls)} · ${(hit.y*100).toFixed(1)}%`;
    scatterTooltip.classList.add('visible');
  } else {
    scatterTooltip.classList.remove('visible');
  }
});
scatterCanvas.addEventListener('mouseleave', () => scatterTooltip.classList.remove('visible'));

// Click scatter dot → open explain modal
scatterCanvas.addEventListener('click', e => {
  const rect = scatterCanvas.getBoundingClientRect();
  const mx   = e.clientX - rect.left;
  const my   = e.clientY - rect.top;
  const HIT  = 12;
  for (const pt of scatterPoints) {
    if (pt._px == null) continue;
    const dx = mx - pt._px, dy = my - pt._py;
    if (Math.sqrt(dx*dx + dy*dy) < HIT) {
      const fe = fileById(pt.id);
      if (fe) openExplainModal(fe);
      return;
    }
  }
});

window.addEventListener('resize', () => { if (scatterPoints.length) renderScatter(); });

/* ═══════════════════════════════════════════════
   RENDER RESULTS
═══════════════════════════════════════════════ */
function renderResults(data, mode, files) {
  resultsSection.className = 'results-section visible';
  resultsBody.innerHTML    = '';
  summaryBtn.style.display = '';

  if (mode === 'per_image') {
    resultsClass.textContent = 'Per-image results';
    resultsMeta.textContent  = `${data.results.length} image${data.results.length!==1?'s':''}`;
    renderPerImage(data.results, files);
    return;
  }

  const probs = mode === 'max_probability' ? data.max_probabilities : data.mean_probabilities;
  const label = mode === 'max_probability' ? 'max probability' : 'mean probability';

  resultsClass.innerHTML  = escHtml(data.predicted_class) + ' ' + riskChip(data.predicted_class, false);
  resultsMeta.textContent = `${data.num_images} image${data.num_images!==1?'s':''} · ${label}`;

  renderAggregate(probs);

  if ((data.per_image || []).length > 1) {
    const sep = document.createElement('p');
    sep.className   = 'per-image-header';
    sep.textContent = `Individual (${data.per_image.length})`;
    resultsBody.appendChild(sep);
    renderPerImage(data.per_image, files);
  }
}

function renderAggregate(probs) {
  if (!probs) return;
  const sorted = Object.entries(probs).sort((a,b) => b[1]-a[1]);
  const wrap   = document.createElement('div');
  wrap.className = 'agg-result';

  const barsHtml = sorted.map(([cls, p], i) => `
    <div class="bar-row" style="animation-delay:${i*60}ms">
      <span class="bar-label">${riskChip(cls)}</span>
      <div class="bar-track"><div class="bar-fill" data-target="${(p*100).toFixed(2)}" style="--bar-color:${riskBarColor(cls)}"></div></div>
      <span class="bar-val">${(p*100).toFixed(1)}%</span>
    </div>`).join('');

  wrap.innerHTML = `<div class="agg-bars">${barsHtml}</div>`;
  resultsBody.appendChild(wrap);
  requestAnimationFrame(() => {
    wrap.querySelectorAll('.bar-fill').forEach(el => { el.style.width = el.dataset.target + '%'; });
  });
}

function renderPerImage(items, fileEntries = []) {
  const wrap = document.createElement('div');
  wrap.className = 'result-rows';

  items.forEach((item, i) => {
    const fe = fileEntries.find(f => f.name === item.filename) || null;
    const row = document.createElement('div');
    row.className = 'result-row';
    row.style.animationDelay = `${i * 40}ms`;

    const hasCam = fe && fe.explanation;
    const explainBtnHtml = fe
      ? `<button class="btn-explain ${hasCam ? 'has-cam' : ''}" data-result-explain="${fe.id}">
           <span class="explain-dot"></span>${hasCam ? 'Explained' : 'Explain'}
         </button>`
      : '';

    row.innerHTML = `
      <span class="result-filename">${escHtml(item.filename)}</span>
      <span class="result-class-wrap">${riskChip(item.predicted_class)}</span>
      <span class="result-conf">${(item.confidence*100).toFixed(1)}%</span>
      ${explainBtnHtml}`;
    wrap.appendChild(row);
  });

  resultsBody.appendChild(wrap);

  wrap.addEventListener('click', async e => {
    const btn = e.target.closest('[data-result-explain]');
    if (!btn) return;
    const fid = +btn.dataset.resultExplain;
    const fe  = fileById(fid);
    if (!fe || !fe.prediction) return;

    btn.classList.add('loading');
    btn.textContent = 'Loading…';
    await openExplainModal(fe);
    btn.classList.remove('loading');
    btn.classList.toggle('has-cam', !!fe.explanation);
    btn.innerHTML = `<span class="explain-dot"></span>${fe.explanation ? 'Explained' : 'Explain'}`;
  });
}

/* ═══════════════════════════════════════════════
   UTILITIES
═══════════════════════════════════════════════ */
function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

const RISK_MAP = {
  'NonDemented':      { level: 'safe', label: 'Safe'      },
  'VeryMildDemented': { level: 'low',  label: 'Very Mild' },
  'MildDemented':     { level: 'mid',  label: 'Mild'      },
  'ModerateDemented': { level: 'high', label: 'Moderate'  },
};
function riskOf(className) { return RISK_MAP[className] || { level: 'low', label: className }; }
function riskChip(cls, showName=true) {
  const r = riskOf(cls);
  const t = showName ? escHtml(cls) : escHtml(r.label);
  return `<span class="risk-chip risk-${r.level}">${t}</span>`;
}
function riskBarColor(cls) {
  const vars = { safe:'var(--risk-safe-fg)', low:'var(--risk-low-fg)', mid:'var(--risk-mid-fg)', high:'var(--risk-high-fg)' };
  return vars[riskOf(cls).level] || 'var(--text)';
}
// Returns a literal CSS color string (not a var()) for canvas usage
function riskBarColorRaw(cls) {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const colors = {
    safe: isDark ? '#4caf7d' : '#2e7d52',
    low:  isDark ? '#c9a84c' : '#9a7020',
    mid:  isDark ? '#c97c3a' : '#9a4e18',
    high: isDark ? '#c0392b' : '#8b2615',
  };
  return colors[riskOf(cls).level] || (isDark ? '#a0a0a0' : '#7a6a5a');
}
